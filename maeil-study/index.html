/* ══════════════════════════════════════

/* 앱 컨테이너 */

  margin: 0 auto;
  height: 100vh;

  background: var(--white);

}

/* ── 네비게이션 바 (윈도우식 이전/앞전) ── */
#nav-bar {

  align-items: center;

}
.nav-btn {

}

}

.nav-btn-off {

</style>

<script>

/* ── 수학 문제 은행 (중1) ── */
const MATH_PROBLEMS = [
  /* 정수와 유리수 */

  { id: 102, grade: "중1", unit: "정수와 유리수", diff: "하", q: "다음을 계산하시오\n4 × (-3) = □", ans: "-12", hints: ["양수×음수 = 반드시 음수!", "4×3=12, 그러면 부호는?", "정답은 -12예요!"], exp: "(양수)×(음수)=음수, 4×3=12 → -12" },
  { id: 103, grade: "중1", unit: "정수와 유리수", diff: "중", q: "다음을 계산하시오\n(-2) × (-4) = □", ans: "8", hints: ["음수×음수 = 양수예요!", "2×4=8, 부호는?", "정답은 8이에요!"], exp: "(음수)×(음수)=양수, 2×4=8 → +8" },
  /* 문자와 식 */
  { id: 201, grade: "중1", unit: "문자와 식", diff: "중", q: "다음 식을 간단히 하시오\n3x + 2x - x = □", ans: "4x", hints: ["x가 붙은 계수끼리만 더하고 빼요", "3+2-1=?", "정답은 4x예요!"], exp: "동류항: (3+2-1)x=4x" },
  { id: 202, grade: "중1", unit: "문자와 식", diff: "하", q: "다음 식을 간단히 하시오\n5a - 2a = □", ans: "3a", hints: ["a가 붙은 계수끼리만 빼요", "5-2=?", "정답은 3a예요!"], exp: "(5-2)a=3a" },
  /* 일차방정식 */
  { id: 301, grade: "중1", unit: "일차방정식", diff: "중", q: "방정식을 푸시오\n2x + 3 = 11\nx = □", ans: "4", hints: ["양쪽에서 3을 빼보세요", "2x=8, 양쪽을 2로 나눠요", "x=4예요!"], exp: "2x+3=11 → 2x=8 → x=4" },
  { id: 302, grade: "중1", unit: "일차방정식", diff: "상", q: "방정식을 푸시오\n3x - 7 = 2x + 1\nx = □", ans: "8", hints: ["x항을 왼쪽, 숫자를 오른쪽으로", "3x-2x = 1+7", "x=8이에요!"], exp: "3x-2x=1+7 → x=8" },
  /* 비와 비율 */
  { id: 401, grade: "중1", unit: "비와 비율", diff: "하", q: "가장 간단한 비로 나타내시오\n6 : 4 = □", ans: "3:2", hints: ["6과 4의 최대공약수를 찾아요", "최대공약수는 2예요", "6÷2 : 4÷2 = 3:2"], exp: "최대공약수(2): 6÷2=3, 4÷2=2 → 3:2" },

/* ── 영어 단어장 ── */
const ENG_WORDS = [
  { word: "beautiful", meaning: "아름다운", example: "She is beautiful." },
  { word: "study", meaning: "공부하다", example: "I study every day." },
  { word: "knowledge", meaning: "지식", example: "Knowledge is power." },
  { word: "important", meaning: "중요한", example: "Education is important." },
  { word: "challenge", meaning: "도전", example: "Don't give up the challenge." },
  { word: "success", meaning: "성공", example: "Hard work leads to success." },
  { word: "dream", meaning: "꿈", example: "Follow your dream." },
  { word: "effort", meaning: "노력", example: "Your effort will pay off." },
  { word: "future", meaning: "미래", example: "Study for your future." },
  { word: "practice", meaning: "연습하다", example: "Practice makes perfect." },
];

/* ── 보상 목록 기본값 ── */
const DEFAULT_REWARDS = [
  { id: 1, name: "에어팟 프로", price: 200000, icon: "ti-headphones" },
  { id: 2, name: "치킨 파티", price: 20000, icon: "ti-tools-kitchen-2" },
  { id: 3, name: "영화 관람권", price: 15000, icon: "ti-movie" },
];

/* ── 앱 상태 (LocalStorage에 자동 저장/복원) ── */
function loadState() {
  try {
    const saved = localStorage.getItem('maeil-study-state');
    return saved ? JSON.parse(saved) : null;
  } catch { return null; }
}
function saveState() {
  try { localStorage.setItem('maeil-study-state', JSON.stringify(S)); } catch {}
}

const defaultState = {
  screen: 'login', user: null,
  qIdx: 0, qTimer: null,
  answers: {}, hintLevel: {}, graded: {},
  rIds: [], rAnswers: {}, rHints: {}, rGraded: {},
  credits: 0, adminTab: 'dash',
  curP: 0, curR: 0,
  odapNote: [], round: 1, firstCorrect: 0,
  rewards: DEFAULT_REWARDS,
  creditPerQ: 500,
  schedules: [
    { id: 1, time: '19:00', label: '저녁 7시', subj: '수학', count: 5, days: '매일', diff: '중', active: true },
    { id: 2, time: '21:00', label: '밤 9시',  subj: '수학', count: 5, days: '평일', diff: '하', active: true },
  ],
  adminPassword: '1234', /* ⚠️ 앱 설치 후 반드시 변경하세요! */
};

let S = loadState() || { ...defaultState };

/* ══ 네비게이션 히스토리 시스템 (윈도우식) ══ */
let NH = ['login'], NP = 0;

const SCREEN_TITLES = {
  login: '매일-스터디 홈', motivational: '학습 명언', study: '1차 학습 중',
  waiting: '채점 대기 중', adminGrade: '관리자 채점 1차', retry: '재도전 학습',
  retryWaiting: '재채점 대기', adminRetryGrade: '관리자 재채점', approved: '학습 완료 ✓',
  studentHome: '하은이 홈', admin: '관리자 홈',
};

try { window.history.replaceState({ p: 0 }, ''); } catch {}

function go(s) {
  NH = NH.slice(0, NP + 1);
  NH.push(s);
  NP = NH.length - 1;
  S.screen = s;
  saveState();
  try { window.history.pushState({ p: NP }, ''); } catch {}
  render();
}

function navBack() {
  if (NP > 0) { NP--; S.screen = NH[NP]; render(); }
}

function navForward() {
  if (NP < NH.length - 1) { NP++; S.screen = NH[NP]; render(); }
}

/* 안드로이드 물리 뒤로가기 버튼 */
window.addEventListener('popstate', function () {
  if (NP > 0) { NP--; S.screen = NH[NP]; render(); }
  else { try { window.history.pushState({ p: 0 }, ''); } catch {} }
});

function updateNavBar() {
  const canB = NP > 0, canF = NP < NH.length - 1;
  const backBtn = document.getElementById('btn-back');
  const fwdBtn  = document.getElementById('btn-fwd');
  const crumb   = document.getElementById('nav-crumb');
  if (!backBtn) return;

  backBtn.className = 'nav-btn ' + (canB ? 'nav-btn-on' : 'nav-btn-off');
  backBtn.disabled  = !canB;
  fwdBtn.className  = 'nav-btn ' + (canF ? 'nav-btn-on' : 'nav-btn-off');
  fwdBtn.disabled   = !canF;

  /* 경로 빵부스러기 (현재 + 이전 최대 2개) */
  const crumbItems = NH.slice(Math.max(0, NP - 2), NP + 1)
    .map((s, i, arr) => {
      const isLast = i === arr.length - 1;
      return `<span style="color:${isLast ? '#2C3E50' : '#888780'};font-weight:${isLast ? '500' : '400'}">${SCREEN_TITLES[s] || s}</span>`;

  crumb.innerHTML = crumbItems;
}

/* ══ 알림 권한 요청 ══ */
async function requestNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') {
    await Notification.requestPermission();
  }
}

/* ══ 예약 알림 설정 ══ */
function scheduleNotification(timeStr, message) {
  const [h, m] = timeStr.split(':').map(Number);
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
  let ms = target - now;
  if (ms < 0) ms += 86400000; /* 내일로 */

  setTimeout(() => {
    if (Notification.permission === 'granted') {
      new Notification('📚 매일-스터디', {
        body: message,
        icon: './icons/icon-192.png',
        vibrate: [200, 100, 200],
        tag: 'study-time',
      });
    }
    document.getElementById('lock-overlay').classList.add('active');
  }, ms);
}

      <div style="display:flex;gap:8px">
        <button class="btn btn-g" onclick="S.curR=Math.max(0,S.curR-1);render()" ${S.curR===0?'disabled':''} style="flex:1;padding:10px">
          <i class="ti ti-arrow-left"></i> 이전
        </button>
        <button onclick="S.curR=Math.min(${rProblems.length-1},S.curR+1);render()" ${S.curR===rProblems.length-1?'disabled':''}

        </button>
      </div>
      <div style="display:flex;gap:5px;justify-content:center">
        ${rProblems.map((pr,i) => `<button onclick="S.curR=${i};render()" style="width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;background:${i===S.curR?'var(--coral)':S.rAnswers[pr.id]?'var(--teal)':'#EBEBEB'};color:${(i===S.curR||S.rAnswers[pr.id])?'white':'var(--gray)'}">${i+1}</button>`).join('')}

    <div class="tag tr" style="margin-bottom:12px"><i class="ti ti-refresh"></i> ${S.round}차 재도전 제출!</div>
    <div style="font-size:18px;font-weight:700;color:var(--navy);margin-bottom:6px">재도전 답안 제출 완료!</div>
    <div style="font-size:13px;color:var(--gray);margin-bottom:24px">이번엔 다 맞았을 거야! 😊</div>
    <div style="display:flex;gap:8px;margin-bottom:32px">
      ${[0,1,2].map(i=>`<div style="width:10px;height:10px;border-radius:50%;background:var(--coral);animation:pulse 1.2s ${i*.2}s ease-in-out infinite"></div>`).join('')}

}

/* ── 관리자 재채점 ── */
function screenAdminRetryGrade() {
  const rProblems = getStudyProblems().filter(p => S.rIds.includes(p.id));
  const allGraded = rProblems.every(p => S.rGraded[p.id] !== undefined);
  const correctIds = rProblems.filter(p => S.rGraded[p.id] === true).map(p=>p.id);
  const wrongIds   = rProblems.filter(p => S.rGraded[p.id] === false).map(p=>p.id);
  const allCorrect = allGraded && wrongIds.length === 0;
  const hasWrong   = allGraded && wrongIds.length > 0;

  return `
  <div class="screen" style="display:flex;flex-direction:column;min-height:calc(100vh - 38px)">
    <div class="hdr hdr-red">
      <div style="font-size:15px;font-weight:700;color:var(--red)"><i class="ti ti-clipboard-check"></i> 재도전 채점 · ${S.round}차</div>
      <div style="font-size:11px;color:var(--gray);margin-top:2px">이전 오답과 새 답을 비교해요</div>
    </div>
    <div style="display:flex;border-bottom:0.5px solid var(--border)">
      <div style="flex:1;padding:10px;text-align:center;border-right:0.5px solid var(--border)"><div style="font-size:20px;font-weight:900;color:var(--teal)">${correctIds.length}</div><div style="font-size:10px;color:var(--gray)">정답</div></div>
      <div style="flex:1;padding:10px;text-align:center;border-right:0.5px solid var(--border)"><div style="font-size:20px;font-weight:900;color:var(--coral)">${wrongIds.length}</div><div style="font-size:10px;color:var(--gray)">오답</div></div>
      <div style="flex:1;padding:10px;text-align:center"><div style="font-size:12px;font-weight:700;color:var(--teal)">총 ${S.firstCorrect+correctIds.length}/${getStudyProblems().length}</div><div style="font-size:10px;color:var(--gray)">최종 정답</div></div>
    </div>
    <div style="flex:1;padding:10px;display:flex;flex-direction:column;gap:8px">
      ${rProblems.map(p => {
        const g = S.rGraded[p.id]; const isC=g===true; const isW=g===false;
        const note = S.odapNote.find(n=>n.id===p.id);
        return `
        <div class="card" style="border-color:${isC?'var(--teal-l)':isW?'var(--coral-l)':'var(--border)'}">
          <div style="display:flex;gap:8px;align-items:flex-start">
            <div style="flex:1">
              <div style="display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap">
                <span class="tag tr" style="font-size:10px"><i class="ti ti-refresh"></i> ${S.round}차</span>
                <span class="tag tt" style="font-size:10px">${p.unit}</span>
              </div>
              <div style="font-size:12px;color:var(--navy);white-space:pre-line;margin-bottom:8px;font-weight:500">${p.q}</div>
              <div style="display:flex;flex-direction:column;gap:3px;font-size:11px">
                ${note?`<div><span style="color:var(--gray)">이전 틀린 답: </span><span style="color:var(--coral);text-decoration:line-through">${note.wrongAns}</span> ❌</div>`:''}
                <div><span style="color:var(--gray)">새로운 답: </span><span style="font-size:15px;font-weight:700;color:${isC?'var(--teal)':isW?'var(--coral)':'var(--navy)'}">${S.rAnswers[p.id]||'?'}</span></div>
                <div><span style="color:var(--gray)">정답: </span><span style="font-weight:700;color:var(--teal)">${p.ans}</span></div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
              <button onclick="S.rGraded[${p.id}]=true;saveState();render()" class="ob ${isC?'oon':'oof'}">⭕</button>
              <button onclick="S.rGraded[${p.id}]=false;saveState();render()" class="ob ${isW?'xon':'xof'}">❌</button>
            </div>
          </div>
          <div style="background:#F8F8F6;border-radius:8px;padding:7px 10px;margin-top:8px;font-size:11px;color:var(--gray)">
            <i class="ti ti-notes"></i> ${p.exp}
          </div>
        </div>`;
      }).join('')}
      ${allCorrect ? `
        <div style="background:var(--teal-ll);border-radius:14px;padding:14px;text-align:center;border:0.5px solid var(--teal-l)">
          <i class="ti ti-circle-check" style="font-size:28px;color:var(--teal);display:block;margin-bottom:6px"></i>
          <div style="font-size:14px;font-weight:700;color:var(--teal-d);margin-bottom:3px">재도전 전부 정답! 🎉</div>
          <div style="font-size:12px;color:var(--gray)">최종 ${S.firstCorrect+correctIds.length}/${getStudyProblems().length}문제 정답!</div>
        </div>
        <button class="btn btn-t" onclick="doRetryApprove()"><i class="ti ti-lock-open"></i> ✅ 최종 승인 · 핸드폰 잠금 해제!</button>`
      : hasWrong ? `
        <div style="background:var(--red-ll);border-radius:14px;padding:14px;border:0.5px solid var(--red-l)">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <i class="ti ti-alert-circle" style="font-size:22px;color:var(--coral);flex-shrink:0"></i>
            <div><div style="font-size:13px;font-weight:700;color:var(--coral-d)">아직 오답 ${wrongIds.length}개!</div><div style="font-size:11px;color:var(--gray)">${S.round+1}차 재도전 요청해요</div></div>
          </div>
          <button class="btn btn-r" onclick="doRetryReturn()"><i class="ti ti-arrow-back-up"></i> 오답 리턴 · ${S.round+1}차 재도전</button>
        </div>`
      : `<p style="text-align:center;font-size:12px;color:var(--gray);padding:10px">재채점 중... (${Object.keys(S.rGraded).length}/${rProblems.length})</p>`}
    </div>
  </div>`;
}

/* ── 승인 완료 화면 ── */
function screenApproved() {
  const retryCorrect = S.rIds.filter(id => S.rGraded[id] === true).length;
  const totalCorrect = S.firstCorrect + (S.rIds.length > 0 ? retryCorrect : 0);
  const earned = totalCorrect * S.creditPerQ;
  return `
  <div class="screen" style="min-height:calc(100vh - 38px);background:var(--teal-ll);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;text-align:center">
    <i class="ti ti-confetti" style="font-size:60px;color:var(--teal);animation:popIn .5s ease,floatY 3s .5s ease-in-out infinite;margin-bottom:16px"></i>
    <div style="font-size:26px;font-weight:900;color:var(--teal-d);margin-bottom:6px">참 잘했어요! <i class="ti ti-star-filled" style="font-size:22px;color:#EF9F27"></i></div>
    <div style="font-size:13px;color:var(--teal-d);margin-bottom:24px">핸드폰 잠금이 해제됐어요! 🔓</div>
    <div class="card" style="max-width:290px;padding:18px;margin-bottom:18px;border-color:var(--teal-l)">
      ${S.rIds.length > 0 ? `
        <div style="display:flex;justify-content:space-around;margin-bottom:10px">
          <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:var(--teal)">${S.firstCorrect}개</div><div style="font-size:10px;color:var(--gray)">1차 정답</div></div>
          <div style="color:var(--gray);font-size:18px;padding-top:6px">+</div>
          <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:var(--coral)">${retryCorrect}개</div><div style="font-size:10px;color:var(--gray)">재도전 정답</div></div>
          <div style="color:var(--gray);font-size:18px;padding-top:6px">=</div>
          <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:var(--teal)">${totalCorrect}개</div><div style="font-size:10px;color:var(--gray)">최종</div></div>
        </div>
        <div style="height:0.5px;background:var(--border);margin-bottom:10px"></div>` : ''}
      <div style="font-size:11px;color:var(--gray);margin-bottom:5px">이번에 적립된 크레딧</div>
      <div style="font-size:40px;font-weight:900;color:var(--coral)">+${earned.toLocaleString()}원</div>
      <div style="font-size:11px;color:var(--gray);margin-top:3px">정답 ${totalCorrect}개 × ${S.creditPerQ.toLocaleString()}원</div>
    </div>
    ${S.odapNote.filter(n=>!n.solved).length > 0
      ? `<div class="tag tr" style="margin-bottom:14px"><i class="ti ti-notes"></i> 오답노트 ${S.odapNote.filter(n=>!n.solved).length}개 저장됨</div>` : ''}
    <button class="btn btn-t" onclick="go('studentHome')" style="max-width:280px"><i class="ti ti-home"></i> 홈으로 가기</button>
  </div>`;
}

        <button class="btn btn-g" onclick="go('login')" style="width:auto;padding:8px 12px;font-size:11px">나가기 <i class="ti ti-logout"></i></button>

        <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">
          ${S.rewards.map(r => { const p2=Math.min((S.credits/r.price)*100,100); return `
          <div class="card" style="min-width:110px;flex-shrink:0;text-align:center;padding:12px;border-color:${p2>=100?'var(--teal-l)':'var(--border)'}">

          <i class="ti ti-notes" style="color:var(--coral)"></i> 오답노트 <span class="tag tr" style="font-size:10px">${unsolved.length}개 미해결</span>
        </div>
        ${unsolved.map(n => `
        <div style="padding:7px 0;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-size:12px;font-weight:500;color:var(--navy)">${n.unit}</div><div style="font-size:10px;color:var(--gray)">오답: ${n.wrongAns} / 정답: ${n.ans}</div></div>
          <span class="ub">미해결</span>

      <div class="card">
        <div style="font-size:13px;font-weight:500;color:var(--navy);margin-bottom:10px"><i class="ti ti-calendar"></i> 오늘 학습 일정</div>

        <div style="display:flex;justify-content:space-between;align-items:center;${i<S.schedules.length-1?'padding-bottom:10px;margin-bottom:10px;border-bottom:0.5px solid var(--border)':''}">

/* ── 관리자 홈 ── */

    {id:'dash',i:'ti-dashboard',l:'현황'},{id:'grade',i:'ti-clipboard-check',l:'채점'},
    {id:'sch',i:'ti-clock',l:'스케줄'},{id:'reward',i:'ti-gift',l:'보상'},{id:'odap',i:'ti-notes',l:'오답노트'},

function adminTabDash() {
  const days = ['월','화','수','목','금','토','일'];
  const bars = [60,80,40,100,70,30,50];
  return `
  <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:10px">

/* ══ 동작 함수들 ══ */
function loginAs(name, role) {
  S.user = { name, role };
  if (role === 'student') { S.qIdx = 0; go('motivational'); }
  else go('admin');
}

function useHint(id) { S.hintLevel[id] = Math.min((S.hintLevel[id]||0)+1, 3); saveState(); render(); }
function useRHint(id) { S.rHints[id] = Math.min((S.rHints[id]||0)+1, 3); saveState(); render(); }

function doApprove() {
  S.firstCorrect = getStudyProblems().filter(p => S.graded[p.id] === true).length;
  S.credits += S.firstCorrect * S.creditPerQ;
  saveState();
  go('approved');
}

function doReturn() {
  const wrongIds = getStudyProblems().filter(p => S.graded[p.id] === false).map(p=>p.id);
  S.firstCorrect = getStudyProblems().filter(p => S.graded[p.id] === true).length;
  wrongIds.forEach(id => {
    const p = getStudyProblems().find(pr=>pr.id===id);
    const ex = S.odapNote.find(n=>n.id===id);
    if (ex) { ex.retries++; ex.wrongAns = S.answers[id]||'?'; }
    else S.odapNote.push({ id, q:p.q, unit:p.unit, wrongAns:S.answers[id]||'?', ans:p.ans, date:new Date().toLocaleDateString('ko-KR'), retries:1, solved:false });
  });
  S.rIds = wrongIds; S.rAnswers = {}; S.rHints = {}; S.rGraded = {}; S.curR = 0; S.round++;
  saveState(); go('retry');
}

function doRetryApprove() {
  const rProblems = getStudyProblems().filter(p=>S.rIds.includes(p.id));
  const retryCorrect = rProblems.filter(p=>S.rGraded[p.id]===true).length;
  rProblems.forEach(p => { const n=S.odapNote.find(n=>n.id===p.id); if(n&&S.rGraded[p.id])n.solved=true; });
  S.credits += (S.firstCorrect + retryCorrect) * S.creditPerQ;
  saveState(); go('approved');
}

function doRetryReturn() {
  const rProblems = getStudyProblems().filter(p=>S.rIds.includes(p.id));
  const stillWrong = rProblems.filter(p=>S.rGraded[p.id]===false).map(p=>p.id);
  rProblems.filter(p=>S.rGraded[p.id]===true).forEach(p => { const n=S.odapNote.find(n=>n.id===p.id); if(n)n.solved=true; });
  stillWrong.forEach(id => { const n=S.odapNote.find(n=>n.id===id); if(n){n.retries++;n.wrongAns=S.rAnswers[id]||'?';} });
  S.rIds=stillWrong; S.rAnswers={}; S.rHints={}; S.rGraded={}; S.curR=0; S.round++;
  saveState(); go('retry');
}
